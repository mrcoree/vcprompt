<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 프롬프트 모음</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 64px 24px 52px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,102,241,0.25) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-badge {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.4);
      color: #a5b4fc;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 20px;
    }
    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    header h1 span {
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      font-size: 1rem;
      color: #94a3b8;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }
    .header-meta {
      margin-top: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .header-count {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #64748b;
      font-size: 0.85rem;
    }
    .header-count span {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 2px 10px;
      color: #94a3b8;
      font-weight: 600;
    }
    .admin-login-btn {
      background: transparent;
      border: 1px solid #1e293b;
      color: #334155;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .admin-login-btn:hover { border-color: #475569; color: #64748b; }

    /* ── Admin bar ── */
    .admin-bar {
      display: none;
      background: #0d1520;
      border-bottom: 1px solid rgba(99,102,241,0.3);
      padding: 10px 24px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .admin-bar.visible { display: flex; }
    .admin-bar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      color: #a5b4fc;
      font-weight: 600;
    }
    .admin-dot {
      width: 7px; height: 7px;
      background: #818cf8;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    .add-prompt-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.4);
      color: #a5b4fc;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .add-prompt-btn:hover { background: rgba(99,102,241,0.25); }
    .admin-logout-btn {
      background: transparent;
      border: 1px solid #334155;
      color: #64748b;
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .admin-logout-btn:hover { border-color: #ef4444; color: #f87171; }

    /* ── Grid ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 18px;
      align-items: start;
    }

    /* ── Card ── */
    .prompt-card {
      background: #161b27;
      border: 1px solid #1e2d3d;
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .prompt-card:hover {
      border-color: rgba(99,102,241,0.5);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .card-accent {
      height: 3px;
      background: var(--accent, linear-gradient(90deg, #6366f1, #8b5cf6));
    }
    .card-inner {
      padding: 20px 22px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .card-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--icon-bg, rgba(99,102,241,0.15));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-icon svg { width: 18px; height: 18px; color: var(--icon-color, #818cf8); }
    .card-title-wrap { flex: 1; min-width: 0; }
    .card-num {
      font-size: 0.7rem; font-weight: 600; color: #475569;
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px;
    }
    .prompt-card h2 { font-size: 0.95rem; font-weight: 600; color: #e2e8f0; line-height: 1.4; }

    /* ── Action row ── */
    .card-actions { display: flex; align-items: center; gap: 8px; }
    .copy-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      color: #a5b4fc;
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .copy-btn:hover { background: rgba(99,102,241,0.22); border-color: rgba(99,102,241,0.6); color: #c7d2fe; }
    .copy-btn.copied { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.4); color: #86efac; }
    .copy-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .toggle-btn {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      background: #1e293b; border: 1px solid #334155; border-radius: 10px;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .toggle-btn:hover { background: #273449; border-color: #475569; }
    .toggle-btn svg { width: 16px; height: 16px; color: #64748b; transition: transform 0.25s, color 0.15s; }
    .toggle-btn.open svg { transform: rotate(180deg); color: #a5b4fc; }

    /* Admin card buttons */
    .admin-card-actions {
      display: none;
      gap: 8px;
    }
    .admin-card-actions.visible { display: flex; }
    .edit-btn, .delete-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .edit-btn {
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa;
    }
    .edit-btn:hover { background: rgba(59,130,246,0.2); }
    .delete-btn {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171;
    }
    .delete-btn:hover { background: rgba(239,68,68,0.2); }
    .edit-btn svg, .delete-btn svg { width: 13px; height: 13px; }

    /* ── Collapsible body ── */
    .card-body { overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
    .card-body.open { max-height: 9999px; }
    .prompt-text {
      font-size: 0.82rem; line-height: 1.75; color: #94a3b8;
      white-space: pre-wrap; background: #0d1117;
      border: 1px solid #1e2d3d; border-radius: 10px; padding: 14px 16px;
    }

    /* ── Modal base ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #161b27;
      border: 1px solid #1e2d3d;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: modalIn 0.2s ease;
    }
    .modal-wide { max-width: 680px; }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h3 {
      font-size: 1.1rem; font-weight: 700; color: #f1f5f9; margin-bottom: 6px;
    }
    .modal p.modal-sub { font-size: 0.85rem; color: #64748b; margin-bottom: 24px; }
    .modal-field { margin-bottom: 16px; }
    .modal-field label { display: block; font-size: 0.8rem; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
    .modal-field input, .modal-field textarea {
      width: 100%;
      background: #0d1117; border: 1px solid #1e2d3d; border-radius: 10px;
      color: #e2e8f0; font-size: 0.88rem; font-family: inherit;
      padding: 10px 14px; outline: none;
      transition: border-color 0.15s;
    }
    .modal-field input:focus, .modal-field textarea:focus { border-color: rgba(99,102,241,0.6); }
    .modal-field input[type="password"] { letter-spacing: 0.1em; }
    .modal-field textarea { resize: vertical; min-height: 240px; line-height: 1.6; }
    .modal-error {
      font-size: 0.8rem; color: #f87171;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px; padding: 8px 12px;
      margin-bottom: 16px; display: none;
    }
    .modal-error.visible { display: block; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; color: white;
      border-radius: 10px; padding: 11px;
      font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-cancel {
      background: #1e293b; border: 1px solid #334155; color: #94a3b8;
      border-radius: 10px; padding: 11px 20px;
      font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-cancel:hover { background: #273449; }

    /* ── Footer ── */
    footer { text-align: center; padding: 24px; color: #334155; font-size: 0.8rem; border-top: 1px solid #1e293b; }
  </style>
</head>
<body>

<!-- Admin bar -->
<div class="admin-bar" id="adminBar">
  <div class="admin-bar-left">
    <div class="admin-dot"></div>
    관리자 모드 활성화
  </div>
  <div style="display:flex;gap:8px;">
    <button class="add-prompt-btn" onclick="openAddModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      프롬프트 추가
    </button>
    <button class="admin-logout-btn" onclick="logout()">로그아웃</button>
  </div>
</div>

<header>
  <div class="header-badge">Prompt Library</div>
  <h1>AI <span>프롬프트</span> 모음</h1>
  <p>원하는 프롬프트를 복사해서 AI 툴에 바로 붙여넣어 사용하세요.</p>
  <div class="header-meta">
    <div class="header-count">총 <span id="totalCount">0</span> 개의 프롬프트</div>
    <button class="admin-login-btn" id="adminBtn" onclick="openLoginModal()">관리자</button>
  </div>
</header>

<main id="promptList"></main>

<footer>투자 분석 강의 자료용 프롬프트 모음집</footer>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h3>관리자 로그인</h3>
    <p class="modal-sub">관리자 계정으로 로그인하세요.</p>
    <div class="modal-error" id="loginError">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <div class="modal-field">
      <label>아이디</label>
      <input type="text" id="loginId" placeholder="아이디 입력" autocomplete="off" />
    </div>
    <div class="modal-field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLoginModal()">취소</button>
      <button class="btn-primary" onclick="doLogin()">로그인</button>
    </div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal modal-wide">
    <h3 id="editModalTitle">프롬프트 추가</h3>
    <p class="modal-sub" id="editModalSub">새 프롬프트의 제목과 내용을 입력하세요.</p>
    <input type="hidden" id="editIndex" value="-1" />
    <div class="modal-field">
      <label>제목</label>
      <input type="text" id="editTitle" placeholder="프롬프트 제목" />
    </div>
    <div class="modal-field">
      <label>내용</label>
      <textarea id="editText" placeholder="프롬프트 내용을 입력하세요..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn-primary" onclick="savePrompt()">저장</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>프롬프트 삭제</h3>
    <p class="modal-sub" id="deleteModalSub">이 프롬프트를 삭제하시겠습니까? 삭제 후 복구할 수 없습니다.</p>
    <input type="hidden" id="deleteIndex" value="-1" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">취소</button>
      <button class="btn-primary" style="background:linear-gradient(135deg,#ef4444,#f97316)" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<script>
  // ── Security: credentials stored as SHA-256 hashes only ──
  const HASH_ID = '44024e0fb3fb92b3ad87c77df2ba5ebade2f4391a41df4176d2824668cf9356d';
  const HASH_PW = '773432ae8381ef77dea3a27883500f52f99b9e0616d2238007bfbce677ce2de2';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // ── Default prompts ──
  const DEFAULT_PROMPTS = [
    {
      title: "IR자료 해설서 출력",
      text: `1. 역할(Role)
- 당신은 투자자, 금융 분석가, 기업 관계자 등을 위해 기업의 IR(Investor Relations) 자료를 꼼꼼히 분석하고 이를 이해하기 쉬운 형태로 제공하는 전문가 AI입니다.

2. 맥락/문맥/상황(Context)
- 사용자는 기업의 IR 자료를 분석하고 이해하려고 합니다.

3. 지시사항(Instructions)
- 사용자가 제공한 기업의 IR 자료를 분석하여 주요 섹션 별로 내용을 분류합니다.
- IR 자료의 사소한 내용도 생략하지 않고 사용자에게 디테일한 정보를 제공합니다.
- IR 자료의 각 페이지별 주요 내용을 꼼꼼히 분석하고 해설을 제공합니다.
- 주요 재무 지표(매출, 영업이익, 당기순이익, 부채 비율 등)를 추출하고 분석합니다.
- 기업 소개, 설립일, 주요 연혁, 팀구성 등 중요한 기업 정보를 명확히 제시합니다.
- 사업 영역별로 상세히 설명하여 각 사업부문의 목적, 전략, 주요 활동 등을 포함합니다.
- 중요한 데이터나 숫자는 한 번 더 확인하여 정확성을 높입니다.
- 데이터의 출처를 IR자료의 페이지로 밝힙니다.
- 주어진 정보만을 사용해 답변하세요. 정보가 부족한 경우 추산하거나 추정하지 말고, '제공된 정보로는 답변할 수 없습니다'라고 응답하세요.
- 불완전하거나 누락된 정보는 보완하거나 추정하지 말고, 그대로 보고하세요.
- 답변은 한국어로 통일합니다.

4. 지침(Guideline)
- 재무 지표와 같은 주요 데이터는 별도로 강조하여 정확하게 제공합니다.
- 재무제표, 경영 성과, 시장 분석 등 다양한 측면에서 종합적으로 접근합니다.
- 설립일, 회사 개요 및 비전, 사업 내용, 시장 분석 및 문제점, 재무 지표, 주요 성과 및 이력, 향후 계획, 마일스톤 등은 반드시 포함하여 출력합니다.
- 비즈니스 모델과 성과를 상세히 설명합니다.
- 항상 객관적이고 중립적인 관점에서 자료를 분석합니다.
- 분석 방법과 절차를 사용자에게 명확히 설명합니다.
- 정확하고 검증된 정보를 제공하며, 잘 모르는 부분은 정직하게 설명합니다.

5. 톤(Tone)
- 신뢰할 수 있고 전문적인 어조를 유지합니다.
- 친절하고 이해하기 쉬운 언어로 소통합니다.

6. 답변 형식(Response Format)
- 분석 결과는 명확하고 간결한 문체를 사용합니다.
- 각 사업부문과 관련된 정보는 모든 사업 내용을 꼼꼼히 분석하여 최소 10줄 이상 상세히 제공합니다.

7. 참고 자료(References)
- 사용자가 제공한 기업의 IR 자료

# Additional Instruction
- 재무성과 부분은 연도별로 작성합니다.
- 각 항목을, 주어진 IR자료에 근거하여 최대한 자세하게 작성합니다.`
    },
    {

  }

  // ── Login ──
  function openLoginModal() {
    document.getElementById('loginId').value = '';
    document.getElementById('loginPw').value = '';
    document.getElementById('loginError').classList.remove('visible');
    document.getElementById('loginModal').classList.add('visible');
    setTimeout(() => document.getElementById('loginId').focus(), 100);
  }
  function closeLoginModal() {
    document.getElementById('loginModal').classList.remove('visible');
  }
  async function doLogin() {
    const id = document.getElementById('loginId').value.trim();
    const pw = document.getElementById('loginPw').value;
    const [hId, hPw] = await Promise.all([sha256(id), sha256(pw)]);
    if (hId === HASH_ID && hPw === HASH_PW) {
      isAdmin = true;
      closeLoginModal();
      document.getElementById('adminBar').classList.add('visible');
      document.getElementById('adminBtn').style.display = 'none';
      render();
    } else {
      document.getElementById('loginError').classList.add('visible');
    }
  }
  function logout() {
    isAdmin = false;
    document.getElementById('adminBar').classList.remove('visible');
    document.getElementById('adminBtn').style.display = '';
    render();
  }

  // ── Add / Edit ──
  function openAddModal() {
    document.getElementById('editModalTitle').textContent = '프롬프트 추가';
    document.getElementById('editModalSub').textContent = '새 프롬프트의 제목과 내용을 입력하세요.';
    document.getElementById('editIndex').value = '-1';
    document.getElementById('editTitle').value = '';
    document.getElementById('editText').value = '';
    document.getElementById('editModal').classList.add('visible');
    setTimeout(() => document.getElementById('editTitle').focus(), 100);
  }
  function openEditModal(index) {
    document.getElementById('editModalTitle').textContent = '프롬프트 수정';
    document.getElementById('editModalSub').textContent = '제목과 내용을 수정하세요.';
    document.getElementById('editIndex').value = index;
    document.getElementById('editTitle').value = prompts[index].title;
    document.getElementById('editText').value = prompts[index].text;
    document.getElementById('editModal').classList.add('visible');
    setTimeout(() => document.getElementById('editTitle').focus(), 100);
  }
  function closeEditModal() {
    document.getElementById('editModal').classList.remove('visible');
  }
  function savePrompt() {
    const title = document.getElementById('editTitle').value.trim();
    const text = document.getElementById('editText').value.trim();
    if (!title || !text) return;
    const idx = parseInt(document.getElementById('editIndex').value);
    if (idx === -1) {
      prompts.push({ title, text });
    } else {
      prompts[idx] = { title, text };
    }
    savePrompts();
    closeEditModal();
    render();
  }

  // ── Delete ──
  function openDeleteModal(index) {
    document.getElementById('deleteIndex').value = index;
    document.getElementById('deleteModalSub').textContent =
      `"${prompts[index].title}" 프롬프트를 삭제하시겠습니까? 삭제 후 복구할 수 없습니다.`;
    document.getElementById('deleteModal').classList.add('visible');
  }
  function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('visible');
  }
  function confirmDelete() {
    const idx = parseInt(document.getElementById('deleteIndex').value);
    prompts.splice(idx, 1);
    savePrompts();
    closeDeleteModal();
    render();
  }

  // ── Escape HTML ──
  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ── Close modals on overlay click ──
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('visible');
    });
  });

  // ── Init ──
  loadPrompts();
  render();
</script>
</body>
</html>
